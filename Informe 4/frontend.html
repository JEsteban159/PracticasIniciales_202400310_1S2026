<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Califica USAC - Inicio</title>

  <!-- React + Babel + Axios via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #4f7cff;
      --accent2:  #7c5cfc;
      --text:     #e8eaf0;
      --muted:    #6b7080;
      --success:  #34d399;
      --danger:   #f87171;
      --radius:   12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }

    /* Auth */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .auth-logo h2 { font-size: 18px; font-weight: 700; }
    .auth-logo span { font-size: 12px; color: var(--muted); display: block; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* Forms */
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 20px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      width: 100%;
      justify-content: center;
    }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }

    /* Navbar */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .nav-logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .nav-logo span { color: var(--accent); }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--muted);
    }
    .avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
    }

    /* Feed */
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .feed-header h1 { font-size: 20px; margin-bottom: 0; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }

    .card-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-curso { background: rgba(79,124,255,.15); color: var(--accent); }
    .badge-catedratico { background: rgba(124,92,252,.15); color: var(--accent2); }

    .card-author { font-size: 13px; color: var(--muted); }
    .card-author strong { color: var(--text); }
    .card-msg { font-size: 15px; line-height: 1.6; margin-bottom: 14px; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Alerts */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-error   { background: rgba(248,113,113,.12); color: var(--danger);  border: 1px solid rgba(248,113,113,.25); }
    .alert-success { background: rgba(52,211,153,.12);  color: var(--success); border: 1px solid rgba(52,211,153,.25); }

    .loader { text-align: center; padding: 40px; color: var(--muted); }
    .empty  { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }

    .switch-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
    .switch-link button { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// CONFIGURACIÓN ----------------------------------------------------------------------------------------------------------------
const API = 'http://localhost:3001/api';

const api = axios.create({ baseURL: API });

api.interceptors.request.use(cfg => {
  const token = localStorage.getItem('token');
  if (token) cfg.headers.Authorization = `Bearer ${token}`;
  return cfg;
});

// ------------------------------------------------------------------------------------------------------------------------------
//                                                           LOGIN FORM
// ------------------------------------------------------------------------------------------------------------------------------
function LoginForm({ onLogin, onSwitch }) {
  const [form, setForm] = useState({ registro_academico: '', contrasena_usuario: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      const { data } = await api.post('/auth/login', form);
      onLogin(data.token, data.usuario);
    } catch (err) {
      setError(err.response?.data?.error || 'Error de conexión — ¿está corriendo el backend?');
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-card">
      <div className="auth-logo">
        <div className="auth-logo-icon">🎓</div>
        <div>
          <h2>Califica USAC</h2>
          <span>Prácticas Iniciales · Sección C</span>
        </div>
      </div>
      <h1>Iniciar sesión</h1>
      <p className="subtitle">Ingresa tu registro académico y contraseña</p>

      {error && <div className="alert alert-error">{error}</div>}

      <div className="field">
        <label>Registro Académico</label>
        <input name="registro_academico" placeholder="202400273" value={form.registro_academico} onChange={handle} />
      </div>
      <div className="field">
        <label>Contraseña</label>
        <input name="contrasena_usuario" type="password" placeholder="••••••••" value={form.contrasena_usuario} onChange={handle} />
      </div>

      <button className="btn btn-primary" onClick={submit} disabled={loading}>
        {loading ? 'Ingresando…' : 'Ingresar →'}
      </button>

      <div className="switch-link">
        ¿No tienes cuenta? <button onClick={onSwitch}>Regístrate</button>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                               REGISTRO FORM
// ------------------------------------------------------------------------------------------------------------------------------
function RegistroForm({ onSwitch }) {
  const [form, setForm] = useState({ 
    registro_academico: '', 
    nombre_usuario: '', 
    apellido_usuario: '', 
    correo_usuario: '', 
    contrasena_usuario: '' 
  });
  const [msg, setMsg] = useState({ type: '', text: '' });
  const [loading, setLoading] = useState(false);

  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const submit = async () => {
    setMsg({}); setLoading(true);
    try {
      await api.post('/auth/registro', form);
      setMsg({ type: 'success', text: '¡Cuenta creada exitosamente! Ya puedes iniciar sesión.' });
      setTimeout(() => onSwitch(), 2000);
    } catch (err) {
      setMsg({ type: 'error', text: err.response?.data?.error || 'Error al registrar' });
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-card">
      <div className="auth-logo">
        <div className="auth-logo-icon">🎓</div>
        <div><h2>Califica USAC</h2><span>Crear cuenta</span></div>
      </div>
      <h1>Registro</h1>
      <p className="subtitle">Completa tus datos para unirte</p>

      {msg.text && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

      <div className="field">
        <label>Registro Académico</label>
        <input name="registro_academico" value={form.registro_academico} onChange={handle} placeholder="202400273" />
      </div>
      <div className="field">
        <label>Nombres</label>
        <input name="nombre_usuario" value={form.nombre_usuario} onChange={handle} placeholder="Ej: Claudia" />
      </div>
      <div className="field">
        <label>Apellidos</label>
        <input name="apellido_usuario" value={form.apellido_usuario} onChange={handle} placeholder="Ej: Monzón" />
      </div>
      <div className="field">
        <label>Correo Electrónico</label>
        <input name="correo_usuario" type="email" value={form.correo_usuario} onChange={handle} placeholder="correo@ejemplo.com" />
      </div>
      <div className="field">
        <label>Contraseña</label>
        <input name="contrasena_usuario" type="password" value={form.contrasena_usuario} onChange={handle} />
      </div>

      <button className="btn btn-primary" onClick={submit} disabled={loading}>
        {loading ? 'Registrando…' : 'Crear cuenta'}
      </button>
      <div className="switch-link">
        ¿Ya tienes cuenta? <button onClick={onSwitch}>Inicia sesión</button>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                              AUTH SCREEN
// ------------------------------------------------------------------------------------------------------------------------------
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState('login');

  return (
    <div className="auth-wrap">
      {mode === 'login'
        ? <LoginForm onLogin={onLogin} onSwitch={() => setMode('registro')} />
        : <RegistroForm onSwitch={() => setMode('login')} />}
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                                MAIN APP
// ------------------------------------------------------------------------------------------------------------------------------
function MainApp({ usuario, onLogout }) {
  const initials = n => n ? n.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() : '?';

  return (
    <div className="app">
      <nav>
        <div className="nav-logo">🎓 <span>Califica</span>USAC</div>
        <div className="nav-user">
          <div className="avatar">{initials(usuario.nombre_usuario)}</div>
          <span>{usuario.nombre_usuario} {usuario.apellido_usuario}</span>
          <button className="btn btn-ghost btn-sm btn-danger" onClick={onLogout}>Salir</button>
        </div>
      </nav>

      <div className="feed-header">
        <h1>Bienvenido, {usuario.nombre_usuario}</h1>
      </div>

      <div className="empty" style={{marginTop: 40}}>
        🚧 Próximamente: Publicaciones, comentarios y más funciones
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                          COMPONENTE PRINCIPAL
// ------------------------------------------------------------------------------------------------------------------------------
function App() {
  const [token,   setToken]   = useState(localStorage.getItem('token'));
  const [usuario, setUsuario] = useState(JSON.parse(localStorage.getItem('usuario') || 'null'));

  const login = (tok, usr) => {
    localStorage.setItem('token', tok);
    localStorage.setItem('usuario', JSON.stringify(usr));
    setToken(tok);
    setUsuario(usr);
  };

  const logout = () => {
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    setToken(null);
    setUsuario(null);
  };

  if (!token) return <AuthScreen onLogin={login} />;
  return <MainApp usuario={usuario} onLogout={logout} />;
}

// Render -----------------------------------------------------------------------------------------------------------------------
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
