<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Califica USAC - Completo</title>

  <!-- React + Babel + Axios via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #4f7cff;
      --accent2:  #7c5cfc;
      --text:     #e8eaf0;
      --muted:    #6b7080;
      --success:  #34d399;
      --danger:   #f87171;
      --warning:  #fbbf24;
      --radius:   12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }

    /* Auth */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .auth-logo h2 { font-size: 18px; font-weight: 700; }
    .auth-logo span { font-size: 12px; color: var(--muted); display: block; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* Forms */
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 90px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 20px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      width: 100%;
      justify-content: center;
    }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-danger { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
    .btn-warning { background: rgba(251,191,36,.15); color: var(--warning); border: 1px solid rgba(251,191,36,.3); }

    /* Navbar */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .nav-logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .nav-logo span { color: var(--accent); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color .2s;
      cursor: pointer;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--muted);
    }
    .avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
    }

    /* Search bar */
    .search-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .search-bar h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--muted);
    }
    .search-input-group {
      display: flex;
      gap: 12px;
    }
    .search-input-group input {
      flex: 1;
    }
    .search-input-group button {
      width: auto;
    }

    /* Filtros avanzados */
    .filters-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .filters-panel h3 {
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--muted);
    }
    .filters-grid-advanced {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .filter-group label {
      font-size: 12px;
      margin-bottom: 0;
    }
    .filter-group input, .filter-group select {
      padding: 8px 12px;
    }
    .filter-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .btn-limpiar {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* Feed */
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .feed-header h1 { font-size: 20px; margin-bottom: 0; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-curso { background: rgba(79,124,255,.15); color: var(--accent); }
    .badge-catedratico { background: rgba(124,92,252,.15); color: var(--accent2); }

    .card-author { font-size: 13px; color: var(--muted); }
    .card-author strong { color: var(--text); }
    .card-msg { font-size: 15px; line-height: 1.6; margin-bottom: 14px; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Modales */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .modal h2 { font-size: 20px; }
    .close-btn {
      background: none; border: none; color: var(--muted);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .close-btn:hover { color: var(--text); }

    /* Comments */
    .comment {
      border-top: 1px solid var(--border);
      padding: 12px 0;
      font-size: 14px;
    }
    .comment strong { color: var(--accent); font-size: 13px; }
    .comment p { margin-top: 4px; line-height: 1.5; }

    /* Perfil */
    .perfil-container {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
    }
    .perfil-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .perfil-header h2 {
      font-size: 20px;
    }
    .perfil-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .perfil-field {
      background: var(--bg);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .perfil-field label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }
    .perfil-field p {
      font-size: 16px;
      font-weight: 500;
    }

    /* Cursos Aprobados */
    .cursos-container {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
    }
    .total-creditos {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      margin-bottom: 24px;
    }
    .total-creditos h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }
    .total-creditos p {
      font-size: 32px;
      font-weight: bold;
    }
    .cursos-table {
      width: 100%;
      border-collapse: collapse;
    }
    .cursos-table th, .cursos-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .cursos-table th {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
    }
    .add-curso-form {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      align-items: flex-end;
    }
    .add-curso-form select {
      flex: 1;
    }
    .add-curso-form button {
      width: auto;
    }

    /* Alerts */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-error   { background: rgba(248,113,113,.12); color: var(--danger);  border: 1px solid rgba(248,113,113,.25); }
    .alert-success { background: rgba(52,211,153,.12);  color: var(--success); border: 1px solid rgba(52,211,153,.25); }

    .loader { text-align: center; padding: 40px; color: var(--muted); }
    .empty  { text-align: center; padding: 40px; color: var(--muted); font-size: 15px; }

    .switch-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
    .switch-link button { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// CONFIGURACIÓN ----------------------------------------------------------------------------------------------------------------
const API = 'http://localhost:3001/api';

const api = axios.create({ baseURL: API });

api.interceptors.request.use(cfg => {
  const token = localStorage.getItem('token');
  if (token) cfg.headers.Authorization = `Bearer ${token}`;
  return cfg;
});

// ------------------------------------------------------------------------------------------------------------------------------
//                                                             LOGIN FORM
// ------------------------------------------------------------------------------------------------------------------------------
function LoginForm({ onLogin, onSwitch, onRecuperar }) {
  const [form, setForm] = useState({ registro_academico: '', contrasena_usuario: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      const { data } = await api.post('/auth/login', form);
      onLogin(data.token, data.usuario);
    } catch (err) {
      setError(err.response?.data?.error || 'Error de conexión — ¿está corriendo el backend?');
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-card">
      <div className="auth-logo">
        <div className="auth-logo-icon">🎓</div>
        <div>
          <h2>Califica USAC</h2>
          <span>Prácticas Iniciales · Sección C</span>
        </div>
      </div>
      <h1>Iniciar sesión</h1>
      <p className="subtitle">Ingresa tu registro académico y contraseña</p>

      {error && <div className="alert alert-error">{error}</div>}

      <div className="field">
        <label>Registro Académico</label>
        <input name="registro_academico" placeholder="202400273" value={form.registro_academico} onChange={handle} />
      </div>
      <div className="field">
        <label>Contraseña</label>
        <input name="contrasena_usuario" type="password" placeholder="••••••••" value={form.contrasena_usuario} onChange={handle} />
      </div>

      <button className="btn btn-primary" onClick={submit} disabled={loading}>
        {loading ? 'Ingresando…' : 'Ingresar →'}
      </button>

      <div className="switch-link">
        <button onClick={onRecuperar}>¿Olvidaste tu contraseña?</button>
      </div>
      <div className="switch-link">
        ¿No tienes cuenta? <button onClick={onSwitch}>Regístrate</button>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                           REGISTRO FORM
// ------------------------------------------------------------------------------------------------------------------------------
function RegistroForm({ onSwitch }) {
  const [form, setForm] = useState({ 
    registro_academico: '', 
    nombre_usuario: '', 
    apellido_usuario: '', 
    correo_usuario: '', 
    contrasena_usuario: '' 
  });
  const [msg, setMsg] = useState({ type: '', text: '' });
  const [loading, setLoading] = useState(false);

  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const submit = async () => {
    setMsg({}); setLoading(true);
    try {
      await api.post('/auth/registro', form);
      setMsg({ type: 'success', text: '¡Cuenta creada exitosamente! Ya puedes iniciar sesión.' });
      setTimeout(() => onSwitch(), 2000);
    } catch (err) {
      setMsg({ type: 'error', text: err.response?.data?.error || 'Error al registrar' });
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-card">
      <div className="auth-logo">
        <div className="auth-logo-icon">🎓</div>
        <div><h2>Califica USAC</h2><span>Crear cuenta</span></div>
      </div>
      <h1>Registro</h1>
      <p className="subtitle">Completa tus datos para unirte</p>

      {msg.text && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

      <div className="field">
        <label>Registro Académico</label>
        <input name="registro_academico" value={form.registro_academico} onChange={handle} placeholder="202400273" />
      </div>
      <div className="field">
        <label>Nombres</label>
        <input name="nombre_usuario" value={form.nombre_usuario} onChange={handle} placeholder="Ej: Claudia" />
      </div>
      <div className="field">
        <label>Apellidos</label>
        <input name="apellido_usuario" value={form.apellido_usuario} onChange={handle} placeholder="Ej: Monzón" />
      </div>
      <div className="field">
        <label>Correo Electrónico</label>
        <input name="correo_usuario" type="email" value={form.correo_usuario} onChange={handle} placeholder="correo@ejemplo.com" />
      </div>
      <div className="field">
        <label>Contraseña</label>
        <input name="contrasena_usuario" type="password" value={form.contrasena_usuario} onChange={handle} />
      </div>

      <button className="btn btn-primary" onClick={submit} disabled={loading}>
        {loading ? 'Registrando…' : 'Crear cuenta'}
      </button>
      <div className="switch-link">
        ¿Ya tienes cuenta? <button onClick={onSwitch}>Inicia sesión</button>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                         RECUPERAR CONTRASEÑA
// ------------------------------------------------------------------------------------------------------------------------------
function RecuperarContrasena({ onBack }) {
  const [form, setForm] = useState({ registro_academico: '', correo_usuario: '' });
  const [nuevaContrasena, setNuevaContrasena] = useState('');
  const [paso, setPaso] = useState(1);
  const [msg, setMsg] = useState({ type: '', text: '' });
  const [loading, setLoading] = useState(false);

  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const verificar = async () => {
    if (!form.registro_academico || !form.correo_usuario) {
      setMsg({ type: 'error', text: 'Por favor completa todos los campos' });
      return;
    }
    
    setMsg({}); setLoading(true);
    try {
      // Usar endpoint público SIN token
      const { data } = await api.get(`/usuarios/buscar-publico/${form.registro_academico}`);
      
      console.log('Usuario encontrado:', data);
      
      // Verificar que el correo coincida
      if (data.correo_usuario && data.correo_usuario.toLowerCase() === form.correo_usuario.toLowerCase()) {
        setPaso(2);
        setMsg({ type: 'success', text: 'Usuario verificado. Ingresa tu nueva contraseña.' });
      } else {
        setMsg({ type: 'error', text: 'El correo no coincide con el registro proporcionado' });
      }
    } catch (err) {
      console.error('Error al buscar usuario:', err);
      if (err.response?.status === 404) {
        setMsg({ type: 'error', text: 'No se encontró un usuario con ese registro académico' });
      } else {
        setMsg({ type: 'error', text: err.response?.data?.error || 'Error al verificar usuario' });
      }
    } finally { 
      setLoading(false); 
    }
  };

  const cambiarContrasena = async () => {
    if (!nuevaContrasena || nuevaContrasena.length < 6) {
      setMsg({ type: 'error', text: 'La contraseña debe tener al menos 6 caracteres' });
      return;
    }
    
    setMsg({}); setLoading(true);
    try {
      // Usar endpoint público SIN token para cambiar contraseña
      await api.put('/usuarios/cambiar-contrasena-publico', { 
        registro_academico: form.registro_academico,
        contrasena_usuario: nuevaContrasena 
      });
      
      setMsg({ type: 'success', text: 'Contraseña actualizada correctamente. Ya puedes iniciar sesión.' });
      setTimeout(() => onBack(), 2500);
    } catch (err) {
      console.error('Error al cambiar contraseña:', err);
      setMsg({ type: 'error', text: err.response?.data?.error || 'Error al cambiar la contraseña' });
    } finally { 
      setLoading(false); 
    }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <div className="auth-logo-icon">🔐</div>
          <div><h2>Recuperar Contraseña</h2></div>
        </div>
        
        {msg.text && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}
        
        {paso === 1 ? (
          <>
            <div className="field">
              <label>Registro Académico</label>
              <input 
                name="registro_academico" 
                value={form.registro_academico} 
                onChange={handle} 
                placeholder="Ej: 202400273"
                autoComplete="off"
              />
            </div>
            <div className="field">
              <label>Correo Electrónico</label>
              <input 
                name="correo_usuario" 
                type="email" 
                value={form.correo_usuario} 
                onChange={handle} 
                placeholder="tu@correo.com"
                autoComplete="off"
              />
            </div>
            <button className="btn btn-primary" onClick={verificar} disabled={loading}>
              {loading ? 'Verificando…' : 'Verificar'}
            </button>
          </>
        ) : (
          <>
            <div className="field">
              <label>Nueva Contraseña</label>
              <input 
                type="password" 
                value={nuevaContrasena} 
                onChange={e => setNuevaContrasena(e.target.value)} 
                placeholder="Mínimo 6 caracteres"
              />
            </div>
            <button className="btn btn-primary" onClick={cambiarContrasena} disabled={loading}>
              {loading ? 'Actualizando…' : 'Actualizar Contraseña'}
            </button>
          </>
        )}
        
        <div className="switch-link">
          <button onClick={onBack}>← Volver al inicio de sesión</button>
        </div>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                            AUTH SCREEN
// ------------------------------------------------------------------------------------------------------------------------------
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [showRecuperar, setShowRecuperar] = useState(false);

  if (showRecuperar) {
    return <RecuperarContrasena onBack={() => setShowRecuperar(false)} />;
  }

  return (
    <div className="auth-wrap">
      {mode === 'login'
        ? <LoginForm onLogin={onLogin} onSwitch={() => setMode('registro')} onRecuperar={() => setShowRecuperar(true)} />
        : <RegistroForm onSwitch={() => setMode('login')} />}
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                           PERFIL DE USUARIO
// ------------------------------------------------------------------------------------------------------------------------------
function PerfilScreen({ usuario, esPropio, onUpdate }) {
  const [editando, setEditando] = useState(false);
  const [form, setForm] = useState({
    nombre_usuario: usuario.nombre || '',
    apellido_usuario: usuario.apellido || '',
    correo_usuario: usuario.correo || ''
  });
  const [msg, setMsg] = useState({ type: '', text: '' });
  const [loading, setLoading] = useState(false);

  const handleChange = e => setForm({ ...form, [e.target.name]: e.target.value });

  const guardarCambios = async () => {
    setMsg({}); setLoading(true);
    try {
      await api.put(`/usuarios/${usuario.id}/perfil`, form);
      const usuarioActualizado = { 
        ...usuario, 
        nombre: form.nombre_usuario,
        apellido: form.apellido_usuario,
        correo: form.correo_usuario
      };
      localStorage.setItem('usuario', JSON.stringify(usuarioActualizado));
      setMsg({ type: 'success', text: 'Perfil actualizado exitosamente' });
      setEditando(false);
      if (onUpdate) onUpdate();
    } catch (err) {
      console.error('Error:', err.response?.data);
      setMsg({ type: 'error', text: err.response?.data?.error || 'Error al actualizar' });
    } finally { setLoading(false); }
  };

  return (
    <div className="perfil-container">
      <div className="perfil-header">
        <h2>Perfil de Usuario</h2>
        {esPropio && !editando && (
          <button className="btn btn-warning btn-sm" onClick={() => setEditando(true)}>
            ✏️ Editar perfil
          </button>
        )}
      </div>

      {msg.text && <div className={`alert alert-${msg.type}`}>{msg.text}</div>}

      {editando ? (
        <>
          <div className="field">
            <label>Nombres</label>
            <input name="nombre_usuario" value={form.nombre_usuario} onChange={handleChange} />
          </div>
          <div className="field">
            <label>Apellidos</label>
            <input name="apellido_usuario" value={form.apellido_usuario} onChange={handleChange} />
          </div>
          <div className="field">
            <label>Correo Electrónico</label>
            <input name="correo_usuario" type="email" value={form.correo_usuario} onChange={handleChange} />
          </div>
          <div className="field">
            <label>Registro Académico (No editable)</label>
            <input value={usuario.registro_academico || ''} disabled />
          </div>
          <div style={{display: 'flex', gap: '12px', marginTop: '16px'}}>
            <button className="btn btn-ghost" onClick={() => setEditando(false)}>Cancelar</button>
            <button className="btn btn-primary" onClick={guardarCambios} disabled={loading}>
              {loading ? 'Guardando…' : 'Guardar cambios'}
            </button>
          </div>
        </>
      ) : (
        <div className="perfil-info">
          <div className="perfil-field">
            <label>Registro Académico</label>
            <p>{usuario.registro_academico || 'No disponible'}</p>
          </div>
          <div className="perfil-field">
            <label>Nombres</label>
            <p>{usuario.nombre || 'No disponible'}</p>
          </div>
          <div className="perfil-field">
            <label>Apellidos</label>
            <p>{usuario.apellido || 'No disponible'}</p>
          </div>
          <div className="perfil-field">
            <label>Correo Electrónico</label>
            <p>{usuario.correo || 'No disponible'}</p>
          </div>
        </div>
      )}
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                      CURSOS APROBADOS
// ------------------------------------------------------------------------------------------------------------------------------
function CursosAprobadosScreen({ usuario, esPropio }) {
  const [cursosAprobados, setCursosAprobados] = useState([]);
  const [todosCursos, setTodosCursos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [agregando, setAgregando] = useState(false);
  const [cursoSeleccionado, setCursoSeleccionado] = useState('');
  const [msg, setMsg] = useState({ type: '', text: '' });

  const cargarCursosAprobados = async () => {
    setLoading(true);
    try {
      const { data } = await api.get(`/usuarios/${usuario.id}/cursos-aprobados`);
      setCursosAprobados(data.cursos || []);
    } catch (err) {
      console.error(err);
    } finally {
      setLoading(false);
    }
  };

  const cargarTodosCursos = async () => {
    try {
      const { data } = await api.get('/cursos');
      setTodosCursos(data);
    } catch (err) {
      console.error(err);
    }
  };

  useEffect(() => {
    cargarCursosAprobados();
    cargarTodosCursos();
  }, []);

  const totalCreditos = cursosAprobados.reduce((sum, c) => sum + (c.creditos_curso || 0), 0);
  const cursosNoAprobados = todosCursos.filter(
    curso => !cursosAprobados.some(ca => ca.curso_id_curso === curso.id_curso)
  );

  const agregarCurso = async () => {
    if (!cursoSeleccionado) {
      setMsg({ type: 'error', text: 'Selecciona un curso' });
      return;
    }
    setAgregando(true);
    setMsg({});
    try {
      await api.post(`/usuarios/${usuario.id}/cursos-aprobados`, { curso_id: cursoSeleccionado });
      setMsg({ type: 'success', text: 'Curso agregado exitosamente' });
      setCursoSeleccionado('');
      cargarCursosAprobados();
    } catch (err) {
      console.error('Error detallado:', err.response?.data);
      setMsg({ type: 'error', text: err.response?.data?.error || 'Error al agregar curso' });
    } finally {
      setAgregando(false);
    }
  };

  const fmtDate = d => new Date(d).toLocaleDateString('es-GT');

  return (
    <div className="cursos-container">
      <h2>Cursos Aprobados</h2>
      <p style={{ color: 'var(--muted)', marginBottom: '24px' }}>
        {esPropio ? 'Administra los cursos que has aprobado' : `Cursos aprobados por ${usuario.nombre} ${usuario.apellido}`}
      </p>

      <div className="total-creditos">
        <h3>Total de Créditos</h3>
        <p>{totalCreditos}</p>
      </div>

      {loading ? (
        <div className="loader">Cargando cursos aprobados…</div>
      ) : cursosAprobados.length === 0 ? (
        <div className="empty">📚 No hay cursos aprobados registrados.</div>
      ) : (
        <table className="cursos-table">
          <thead>
            <tr>
              <th>Curso</th>
              <th>Créditos</th>
              <th>Área</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody>
            {cursosAprobados.map(curso => (
              <tr key={curso.id_registro}>
                <td>{curso.nombre_curso}</td>
                <td>{curso.creditos_curso}</td>
                <td>{curso.area_curso}</td>
                <td>{fmtDate(curso.fecha_aprobacion)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}

      {esPropio && cursosNoAprobados.length > 0 && (
        <div className="add-curso-form">
          <select value={cursoSeleccionado} onChange={e => setCursoSeleccionado(e.target.value)}>
            <option value="">-- Selecciona un curso --</option>
            {cursosNoAprobados.map(curso => (
              <option key={curso.id_curso} value={curso.id_curso}>
                {curso.nombre_curso} ({curso.creditos_curso} créditos)
              </option>
            ))}
          </select>
          <button className="btn btn-primary" onClick={agregarCurso} disabled={agregando}>
            {agregando ? 'Agregando…' : '+ Agregar curso aprobado'}
          </button>
        </div>
      )}

      {msg.text && <div className={`alert alert-${msg.type}`} style={{ marginTop: '16px' }}>{msg.text}</div>}
    </div>
  );
}

function NuevaPublicacionModal({ onClose, onCreated, cursos, catedraticos }) {
  const [form, setForm] = useState({ tipo_publicacion: 'curso', id_referencia_publicacion: '', mensaje_publicacion: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const opciones = form.tipo_publicacion === 'curso' ? cursos : catedraticos;
  const handle = e => setForm({ ...form, [e.target.name]: e.target.value });

  const submit = async () => {
    if (!form.id_referencia_publicacion || !form.mensaje_publicacion) {
      setError('Por favor completa todos los campos');
      return;
    }
    setError(''); setLoading(true);
    try {
      await api.post('/publicaciones', form);
      onCreated();
    } catch (err) {
      setError(err.response?.data?.error || 'Error al crear publicación');
    } finally { setLoading(false); }
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2>Nueva Publicación</h2>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        {error && <div className="alert alert-error">{error}</div>}
        <div className="field">
          <label>Publicar sobre</label>
          <select name="tipo_publicacion" value={form.tipo_publicacion} onChange={handle}>
            <option value="curso">Curso</option>
            <option value="catedratico">Catedrático</option>
          </select>
        </div>
        <div className="field">
          <label>{form.tipo_publicacion === 'curso' ? 'Selecciona el curso' : 'Selecciona el catedrático'}</label>
          <select name="id_referencia_publicacion" value={form.id_referencia_publicacion} onChange={handle}>
            <option value="">-- Selecciona --</option>
            {opciones.map(o => (
              <option key={o.id_curso || o.id_catedratico} value={o.id_curso || o.id_catedratico}>
                {o.nombre_curso || `${o.nombre_catedratico} ${o.apellido_catedratico}`}
              </option>
            ))}
          </select>
        </div>
        <div className="field">
          <label>Tu reseña / mensaje</label>
          <textarea name="mensaje_publicacion" placeholder="Escribe tu opinión aquí…" value={form.mensaje_publicacion} onChange={handle} />
        </div>
        <div style={{display:'flex', gap:10}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading} style={{flex:2}}>
            {loading ? 'Publicando…' : 'Publicar'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ComentariosModal({ publicacion, onClose }) {
  const [comentarios, setComentarios] = useState([]);
  const [nuevo, setNuevo] = useState('');
  const [loading, setLoading] = useState(true);

  const cargar = async () => {
    try {
      const { data } = await api.get(`/publicaciones/${publicacion.id_publicacion}/comentarios`);
      setComentarios(data);
    } catch { setComentarios([]); }
    finally { setLoading(false); }
  };

  useEffect(() => { cargar(); }, []);

  const enviar = async () => {
    if (!nuevo.trim()) return;
    try {
      await api.post(`/publicaciones/${publicacion.id_publicacion}/comentarios`, { mensaje_comentario: nuevo });
      setNuevo('');
      cargar();
    } catch {}
  };

  const fmtDate = d => new Date(d).toLocaleDateString('es-GT', { day:'2-digit', month:'short' });

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2>Comentarios</h2>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="card" style={{marginBottom:20, padding:'16px'}}>
          <p style={{fontSize:15, lineHeight:1.6}}>{publicacion.mensaje_publicacion}</p>
          <p style={{fontSize:12, color:'var(--muted)', marginTop:8}}>
            — {publicacion.nombre_usuario} {publicacion.apellido_usuario}
          </p>
        </div>
        {loading
          ? <div className="loader">Cargando comentarios…</div>
          : comentarios.length === 0
            ? <div className="empty" style={{padding:'20px 0'}}>Sin comentarios aún. ¡Sé el primero!</div>
            : comentarios.map(c => (
              <div className="comment" key={c.id_comentario}>
                <strong>{c.nombre_usuario} {c.apellido_usuario} · {fmtDate(c.fecha_comentario)}</strong>
                <p>{c.mensaje_comentario}</p>
              </div>
            ))
        }
        <div style={{marginTop:20, display:'flex', gap:8}}>
          <input placeholder="Agrega un comentario…" value={nuevo} onChange={e => setNuevo(e.target.value)} onKeyDown={e => e.key === 'Enter' && enviar()} />
          <button className="btn btn-primary btn-sm" onClick={enviar} style={{width:'auto'}}>Enviar</button>
        </div>
      </div>
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                            MAIN APP
// ------------------------------------------------------------------------------------------------------------------------------
function MainApp({ usuario, onLogout }) {
  const [publicaciones, setPublicaciones] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cursos, setCursos] = useState([]);
  const [catedraticos, setCatedraticos] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [vista, setVista] = useState('inicio');
  const [usuarioBuscado, setUsuarioBuscado] = useState(null);
  const [busquedaError, setBusquedaError] = useState('');
  
  // Filtros avanzados
  const [filtros, setFiltros] = useState({
    tipo: '',
    referencia_id: '',
    nombre_curso: '',
    nombre_catedratico: ''
  });

  // Cargar catálogos
  useEffect(() => {
    const cargarCatalogos = async () => {
      try {
        const [cursosRes, catedraticosRes] = await Promise.all([
          api.get('/cursos'),
          api.get('/catedraticos')
        ]);
        setCursos(cursosRes.data);
        setCatedraticos(catedraticosRes.data);
      } catch (err) {
        console.error('Error cargando catálogos:', err);
      }
    };
    cargarCatalogos();
  }, []);

  const cargarPublicaciones = async () => {
    setLoading(true);
    try {
      const params = {};
      if (filtros.tipo) params.tipo = filtros.tipo;
      if (filtros.referencia_id) params.referencia_id = filtros.referencia_id;
      
      const { data } = await api.get('/publicaciones', { params });
      setPublicaciones(data);
    } catch (err) {
      console.error(err);
      setPublicaciones([]);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    cargarPublicaciones();
  }, [filtros.tipo, filtros.referencia_id]);

  const buscarUsuario = async (registro) => {
    if (!registro) return;
    setBusquedaError('');
    try {
      const { data } = await api.get(`/usuarios/buscar/${registro}`);
      const usuarioTransformado = {
        id: data.id_usuario,
        registro_academico: data.registro_academico,
        nombre: data.nombre_usuario,
        apellido: data.apellido_usuario,
        correo: data.correo_usuario
      };
      setUsuarioBuscado(usuarioTransformado);
      setVista('perfil');
    } catch {
      setBusquedaError('Usuario no encontrado');
      setUsuarioBuscado(null);
    }
  };

  // Funciones de filtros avanzados
  const handleFiltroCurso = () => {
    if (filtros.nombre_curso) {
      const curso = cursos.find(c => 
        c.nombre_curso.toLowerCase().includes(filtros.nombre_curso.toLowerCase())
      );
      if (curso) {
        setFiltros({
          tipo: 'curso',
          referencia_id: curso.id_curso,
          nombre_curso: '',
          nombre_catedratico: ''
        });
      }
    }
  };

  const handleFiltroCatedratico = () => {
    if (filtros.nombre_catedratico) {
      const catedratico = catedraticos.find(c => 
        `${c.nombre_catedratico} ${c.apellido_catedratico}`.toLowerCase()
          .includes(filtros.nombre_catedratico.toLowerCase())
      );
      if (catedratico) {
        setFiltros({
          tipo: 'catedratico',
          referencia_id: catedratico.id_catedratico,
          nombre_curso: '',
          nombre_catedratico: ''
        });
      }
    }
  };

  const limpiarFiltros = () => {
    setFiltros({
      tipo: '',
      referencia_id: '',
      nombre_curso: '',
      nombre_catedratico: ''
    });
  };

  const initials = (nombre, apellido) => {
    if (!nombre && !apellido) return '?';
    const primera = nombre ? nombre.charAt(0).toUpperCase() : '';
    const segunda = apellido ? apellido.charAt(0).toUpperCase() : '';
    return (primera + segunda) || '?';
  };

  const fmtDate = d => new Date(d).toLocaleDateString('es-GT', { day:'2-digit', month:'short', year:'numeric' });

  return (
    <div className="app">
      <nav>
        <div className="nav-logo">🎓 <span>Califica</span>USAC</div>
        <div className="nav-links">
          <a onClick={() => { setVista('inicio'); setUsuarioBuscado(null); }}>Inicio</a>
          <a onClick={() => { setVista('perfil'); setUsuarioBuscado(usuario); }}>Mi Perfil</a>
          <a onClick={() => setVista('cursos')}>Mis Cursos</a>
        </div>
        <div className="nav-user">
          <div className="avatar">{initials(usuario.nombre, usuario.apellido)}</div>
          <span>{usuario.nombre} {usuario.apellido}</span>
          <button className="btn btn-ghost btn-sm btn-danger" onClick={onLogout}>Salir</button>
        </div>
      </nav>

      {vista === 'inicio' && (
        <>
          {/* Barra de búsqueda de usuarios*/}
          <div className="search-bar">
            <h3>🔍 Buscar usuario por Registro Académico</h3>
            <div className="search-input-group">
              <input 
                id="searchRegistro"
                placeholder="Ej: 202400000"
                onKeyDown={e => e.key === 'Enter' && buscarUsuario(e.target.value)}
              />
              <button className="btn btn-primary" onClick={() => buscarUsuario(document.getElementById('searchRegistro').value)}>
                Buscar
              </button>
            </div>
            {busquedaError && <div className="alert alert-error" style={{marginTop: 12}}>{busquedaError}</div>}
          </div>

          {/* Panel de filtros avanzados */}
          <div className="filters-panel">
            <h3>🔎 Filtrar publicaciones</h3>
            <div className="filters-grid-advanced">
              <div className="filter-group">
                <label>Filtrar por Curso</label>
                <select 
                  value={filtros.tipo === 'curso' ? filtros.referencia_id : ''} 
                  onChange={(e) => {
                    if (e.target.value) {
                      setFiltros({ ...filtros, tipo: 'curso', referencia_id: e.target.value, nombre_curso: '', nombre_catedratico: '' });
                    } else {
                      setFiltros({ ...filtros, tipo: '', referencia_id: '' });
                    }
                  }}
                >
                  <option value="">Todos los cursos</option>
                  {cursos.map(c => (
                    <option key={c.id_curso} value={c.id_curso}>{c.nombre_curso}</option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <label>Filtrar por Catedrático</label>
                <select 
                  value={filtros.tipo === 'catedratico' ? filtros.referencia_id : ''} 
                  onChange={(e) => {
                    if (e.target.value) {
                      setFiltros({ ...filtros, tipo: 'catedratico', referencia_id: e.target.value, nombre_curso: '', nombre_catedratico: '' });
                    } else {
                      setFiltros({ ...filtros, tipo: '', referencia_id: '' });
                    }
                  }}
                >
                  <option value="">Todos los catedráticos</option>
                  {catedraticos.map(c => (
                    <option key={c.id_catedratico} value={c.id_catedratico}>
                      {c.nombre_catedratico} {c.apellido_catedratico}
                    </option>
                  ))}
                </select>
              </div>

              <div className="filter-group">
                <label>Buscar por nombre de curso</label>
                <input 
                  type="text"
                  value={filtros.nombre_curso}
                  onChange={e => setFiltros({ ...filtros, nombre_curso: e.target.value })}
                  placeholder="Ej: Bases de Datos"
                />
                <button className="btn btn-sm btn-ghost" onClick={handleFiltroCurso}>Buscar</button>
              </div>

              <div className="filter-group">
                <label>Buscar por nombre de catedrático</label>
                <input 
                  type="text"
                  value={filtros.nombre_catedratico}
                  onChange={e => setFiltros({ ...filtros, nombre_catedratico: e.target.value })}
                  placeholder="Ej: Adolfo Jimenez"
                />
                <button className="btn btn-sm btn-ghost" onClick={handleFiltroCatedratico}>Buscar</button>
              </div>
            </div>
            <div className="filter-actions">
              <button className="btn btn-sm btn-limpiar" onClick={limpiarFiltros}>
                Limpiar todos los filtros
              </button>
            </div>
          </div>

          <div className="feed-header">
            <div>
              <h1>Feed de Publicaciones</h1>
              <p style={{color:'var(--muted)', fontSize:14}}>{publicaciones.length} publicaciones</p>
            </div>
            <button className="btn btn-primary btn-sm" onClick={() => setShowModal(true)} style={{width:'auto'}}>
              + Nueva publicación
            </button>
          </div>

          {loading
            ? <div className="loader">Cargando publicaciones…</div>
            : publicaciones.length === 0
              ? <div className="empty">📭 No hay publicaciones aún. ¡Sé el primero!</div>
              : publicaciones.map(p => (
                <div className="card" key={p.id_publicacion}>
                  <div className="card-meta">
                    <span className={`badge badge-${p.tipo_publicacion === 'curso' ? 'curso' : 'catedratico'}`}>
                      {p.tipo_publicacion === 'curso' ? '📚 Curso' : '👤 Catedrático'}
                    </span>
                    <span className="card-author">
                      por <strong>{p.nombre_usuario} {p.apellido_usuario}</strong> · {p.registro_academico}
                    </span>
                  </div>
                  <p className="card-msg">{p.mensaje_publicacion}</p>
                  <div className="card-footer">
                    <span>💬 {p.total_comentarios} comentarios</span>
                    <div style={{display:'flex', gap:8}}>
                      <span>{fmtDate(p.fecha_publicacion)}</span>
                      <button className="btn btn-ghost btn-sm" onClick={() => setSelected(p)}>
                        Ver comentarios
                      </button>
                    </div>
                  </div>
                </div>
              ))
          }

          {showModal &&
            <NuevaPublicacionModal
              onClose={() => setShowModal(false)}
              onCreated={() => { setShowModal(false); cargarPublicaciones(); }}
              cursos={cursos}
              catedraticos={catedraticos}
            />
          }

          {selected &&
            <ComentariosModal
              publicacion={selected}
              onClose={() => setSelected(null)}
            />
          }
        </>
      )}

      {vista === 'perfil' && (
        <PerfilScreen 
          usuario={usuarioBuscado || usuario} 
          esPropio={!usuarioBuscado || usuarioBuscado.id === usuario.id}
          onUpdate={() => {
            if (!usuarioBuscado) {
              const usuarioActualizado = JSON.parse(localStorage.getItem('usuario'));
              setUsuarioBuscado(usuarioActualizado);
            }
          }}
        />
      )}

      {vista === 'cursos' && (
        <CursosAprobadosScreen usuario={usuario} esPropio={true} />
      )}
    </div>
  );
}

// ------------------------------------------------------------------------------------------------------------------------------
//                                                          COMPONENTE PRINCIPAL
// ------------------------------------------------------------------------------------------------------------------------------
function App() {
  const [token, setToken] = useState(localStorage.getItem('token'));
  const [usuario, setUsuario] = useState(JSON.parse(localStorage.getItem('usuario') || 'null'));

  const login = (tok, usr) => {
    const usuarioTransformado = {
      id: usr.id_usuario || usr.id,
      nombre: usr.nombre,
      apellido: usr.apellido,
      registro_academico: usr.registro,
      correo: usr.correo
    };
    localStorage.setItem('token', tok);
    localStorage.setItem('usuario', JSON.stringify(usuarioTransformado));
    setToken(tok);
    setUsuario(usuarioTransformado);
  };

  const logout = () => {
    localStorage.removeItem('token');
    localStorage.removeItem('usuario');
    setToken(null);
    setUsuario(null);
  };

  if (!token) return <AuthScreen onLogin={login} />;
  return <MainApp usuario={usuario} onLogout={logout} />;
}

// Render -----------------------------------------------------------------------------------------------------------------------
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
